upstream ms1 {
    server ms1-core-api:3001;
}

upstream ms2 {
    server ms2-speech-agent:8000;
}

# ─── HTTP ────────────────────────────────────────────────────────────────────
# Serve Let's Encrypt ACME challenge; redirect everything else → HTTPS
server {
    listen 80;
    server_name englishx.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ───────────────────────────────────────────────────────────────────
# Terminates TLS; proxies /api/* → ms1 and /speech/* → ms2.
# The Next.js frontend lives on Vercel and calls this EC2 directly.
server {
    listen 443 ssl;
    http2 on;
    server_name englishx.duckdns.org;

    # Let's Encrypt certificate (issued by deploy.sh via Certbot)
    ssl_certificate     /etc/letsencrypt/live/englishx.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/englishx.duckdns.org/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/englishx.duckdns.org/chain.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── CORS for Vercel frontend ──────────────────────────────────────────────
    # Allow the Vercel deployment to call these backends cross-origin.
    # Update the origin below when you know your Vercel URL (or use '*' during dev).
    set $cors_origin "";
    if ($http_origin ~* "^https://(.*\.vercel\.app|englishx\.duckdns\.org)$") {
        set $cors_origin $http_origin;
    }

    add_header Access-Control-Allow-Origin  $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age 86400 always;

    # Handle OPTIONS pre-flight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    client_max_body_size 25M;
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    gzip on;
    gzip_types application/json text/plain application/javascript text/css text/html;
    gzip_min_length 256;

    # ── Core API (ms1 — Express) ──────────────────────────────────────────────
    location /api/ {
        proxy_pass http://ms1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Speech Agent (ms2 — FastAPI) ─────────────────────────────────────────
    location /speech/ {
        proxy_pass http://ms2;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;   # audio upload headroom
        proxy_read_timeout 180s;    # LangGraph + LLM calls can be slow
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://ms1/api/health;
    }

    # ── API docs (Swagger / FastAPI) ─────────────────────────────────────────
    location /api/docs {
        proxy_pass http://ms1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /speech/docs {
        proxy_pass http://ms2;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Root: redirect to Vercel frontend ────────────────────────────────────
    location = / {
        return 302 https://englishx.vercel.app;
    }
}
