upstream ms1 {
    server ms1-core-api:3001;
}

upstream ms2 {
    server ms2-speech-agent:8000;
}

# HTTP — serve Certbot ACME challenge, redirect everything else to HTTPS
server {
    listen 80;
    server_name englishx.duckdns.org;

    # Let's Encrypt webroot challenge (used on first cert issuance and renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
