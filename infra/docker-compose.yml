
services:
  # ms1 — Core API (Express.js)
  ms1-core-api:
    build: ../ms1-core-api
    ports:
      - "3001:3001"
    env_file:
      - ../ms1-core-api/.env
    environment:
      - PORT=3001
      - NODE_ENV=production
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - MS2_BASE_URL=http://ms2-speech-agent:8000
      # Vercel frontend URL — CORS origin and invite link base
      - FRONTEND_URL=https://englishx.vercel.app
    restart: unless-stopped

  # ms2 — Speech Agent (FastAPI + LangGraph)
  ms2-speech-agent:
    build: ../ms2-speech-agent
    ports:
      - "8000:8000"
    env_file:
      - ../ms2-speech-agent/.env
    environment:
      - PORT=8000
      - MS1_BASE_URL=http://ms1-core-api:3001
    restart: unless-stopped

  # NGINX Reverse Proxy — TLS termination + routing to ms1 & ms2
  # The Next.js frontend is hosted on Vercel; this EC2 only serves /api/* and /speech/*
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - ms1-core-api
      - ms2-speech-agent
    restart: unless-stopped

  # Certbot — automatic SSL certificate renewal (production only; run then sleep)
  certbot:
    image: certbot/certbot:latest
    profiles:
      - certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

volumes:
  certbot_webroot:
  letsencrypt:
